<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropHedge - VISIONTRADING</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Barlow:wght@400;700&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({pageLanguage: 'it', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
}
</script>
<script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<style>
:root { --bg:#060810; --bg2:#0c0f1a; --border:#1e2840; --t:#eef0f8; --t2:#8090b8; --t3:#3d4d78; --teal:#00e5cc; --teal2:#00b8a4; --violet:#9b5de5; --red:#ff4060; --green:#00d68f; --fm:'Barlow',sans-serif; --fd:'DM Mono',monospace; --fh:'Chakra Petch',sans-serif; }
body { background:var(--bg); color:var(--t); font-family:var(--fm); margin:0; padding-bottom:100px; min-height:100vh; top:0 !important; }
.skiptranslate iframe { display:none !important; }
.hdr { height:60px; background:rgba(6,8,16,0.95); display:flex; align-items:center; padding:0 24px; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.logo-nm { font-family:var(--fh); font-size:18px; font-weight:700; }
.tabs { display:flex; background:rgba(6,8,16,0.95); border-bottom:1px solid var(--border); padding:0 12px; position:sticky; top:60px; z-index:99; overflow-x:auto; }
.tab { padding:12px 18px; cursor:pointer; font-size:11px; font-weight:600; color:var(--t3); text-transform:uppercase; white-space:nowrap; }
.tab.active { color:var(--teal); border-bottom:2px solid var(--teal); }
.content { padding:24px; max-width:1400px; margin:0 auto; }
.panel { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:14px; }
.btn-p { background:linear-gradient(135deg, var(--teal2), var(--violet)); border:none; color:#fff; padding:10px 20px; border-radius:10px; cursor:pointer; font-weight:700; text-transform:uppercase; font-size:11px; display:flex; align-items:center; justify-content:center; gap:8px; }
.f label { display:block; font-size:10px; color:var(--t3); margin-bottom:5px; text-transform:uppercase; }
.f input { width:100%; padding:10px; background:#111628; border:1px solid var(--border); color:#fff; border-radius:8px; outline:none; box-sizing:border-box; }
#aiFloatBtn { position:fixed; bottom:30px; right:30px; width:60px; height:60px; border-radius:50%; background:linear-gradient(135deg,#00b8a4,#9b5de5); border:none; font-size:28px; cursor:pointer; z-index:1000; box-shadow:0 8px 24px rgba(0,0,0,0.4); }
#aiFloatPanel { position:fixed; bottom:100px; right:30px; width:360px; background:#0a0c18; border:1px solid rgba(0,229,204,0.3); border-radius:18px; display:none; flex-direction:column; z-index:1000; overflow:hidden; box-shadow:0 12px 40px rgba(0,0,0,0.6); }
#aiFloatPanel.open { display:flex; }
.ai-msg-row { display:flex; gap:10px; padding:12px; align-items:flex-start; }
.ai-msg-row.user { flex-direction:row-reverse; }
.ai-bubble { padding:10px 14px; border-radius:12px; font-size:13px; max-width:80%; line-height:1.5; }
.ai-bubble.bot { background:#13162a; color:#c8d0e8; border-bottom-left-radius:2px; }
.ai-bubble.usr { background:rgba(0,229,204,0.15); color:#fff; border-bottom-right-radius:2px; }
.ai-msg-ava { width:32px; height:32px; border-radius:50%; overflow:hidden; background:var(--bg3); flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.ai-msg-ava img { width:100%; height:100%; object-fit:cover; }
</style>
</head>
<body>

<div id="loginPage" style="position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;align-items:center;justify-content:center;">
  <div class="panel" style="width:380px;text-align:center;border-color:var(--teal2)">
    <h2>PropHedge Pro</h2>
    <div class="f" style="text-align:left;margin-bottom:10px"><label>Email</label><input id="l_email" type="email"></div>
    <div class="f" style="text-align:left;margin-bottom:20px"><label>Password</label><input id="l_pass" type="password"></div>
    <button onclick="doLogin()" class="btn-p" style="width:100%">Accedi</button>
    <button onclick="document.getElementById('loginPage').style.display='none';document.getElementById('purchasePage').style.display='flex'" style="margin-top:10px;background:none;border:none;color:var(--teal);cursor:pointer;font-size:11px">📝 Registrati Gratis</button>
  </div>
</div>

<div id="purchasePage" style="position:fixed;inset:0;background:var(--bg);z-index:2001;display:none;align-items:center;justify-content:center;">
  <div class="panel" style="width:380px">
    <h3>Richiedi Accesso</h3>
    <div class="f"><label>Nome</label><input id="r_name" type="text"></div>
    <div class="f"><label>Email</label><input id="r_email" type="email"></div>
    <div class="f"><label>Password</label><input id="r_pass" type="password"></div>
    <button onclick="doRegister()" class="btn-p" style="width:100%;margin-top:20px">Invia Richiesta</button>
    <button onclick="location.reload()" style="width:100%;margin-top:10px;background:none;border:none;color:var(--t3);cursor:pointer">Annulla</button>
  </div>
</div>

<div class="hdr">
  <div class="logo-nm"><span style="color:var(--teal)">Prop</span><span style="color:var(--violet)">Hedge</span></div>
  <div id="tabAccount" onclick="toggleAcc(event)" style="margin-left:auto; cursor:pointer; display:flex; align-items:center; gap:10px; background:var(--bg2); padding:6px 12px; border-radius:10px; border:1px solid var(--border)">
    <div id="nav_photo" style="width:28px;height:28px;border-radius:50%;background:var(--bg3);overflow:hidden;display:flex;align-items:center;justify-content:center">👤</div>
    <span id="nav_name" style="font-size:12px;font-weight:600">Account</span>
  </div>
</div>

<div id="accPanel" style="display:none;position:fixed;top:70px;right:20px;width:320px;background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px;z-index:2000;box-shadow:0 15px 50px rgba(0,0,0,0.7)">
  <div style="text-align:center">
    <div onclick="document.getElementById('f_up').click()" style="width:70px;height:70px;border-radius:50%;background:var(--bg3);margin:0 auto 15px;overflow:hidden;border:2px solid var(--teal);cursor:pointer">
      <div id="p_photo" style="font-size:30px;line-height:70px">👤</div>
    </div>
    <input type="file" id="f_up" style="display:none" onchange="uploadP(this)">
    
    <button onclick="document.getElementById('langOpts').style.display=document.getElementById('langOpts').style.display==='none'?'grid':'none'" class="btn-p" style="width:100%;margin-bottom:15px;background:var(--bg3);border:1px solid var(--teal)">🌐 SCEGLI LINGUA / LANGUAGE</button>
    <div id="langOpts" style="display:none; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:15px">
      <button onclick="changeL('it')" style="background:var(--bg);color:#fff;border:1px solid var(--border);padding:8px;border-radius:8px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;gap:5px"><img src="https://flagcdn.com/w20/it.png" width="16"> ITALIA</button>
      <button onclick="changeL('en')" style="background:var(--bg);color:#fff;border:1px solid var(--border);padding:8px;border-radius:8px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;gap:5px"><img src="https://flagcdn.com/w20/gb.png" width="16"> INGLESE</button>
      <button onclick="changeL('es')" style="background:var(--bg);color:#fff;border:1px solid var(--border);padding:8px;border-radius:8px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;gap:5px"><img src="https://flagcdn.com/w20/es.png" width="16"> SPAGNA</button>
      <button onclick="changeL('fr')" style="background:var(--bg);color:#fff;border:1px solid var(--border);padding:8px;border-radius:8px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;gap:5px"><img src="https://flagcdn.com/w20/fr.png" width="16"> FRANCIA</button>
      <button onclick="changeL('de')" style="background:var(--bg);color:#fff;border:1px solid var(--border);padding:8px;border-radius:8px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;gap:5px"><img src="https://flagcdn.com/w20/de.png" width="16"> GERMANIA</button>
    </div>
    <div id="google_translate_element" style="display:none"></div>

    <div class="f" style="text-align:left"><label>Nome</label><input id="p_fn"></div>
    <div class="f" style="text-align:left;margin-top:10px"><label>Cognome</label><input id="p_ln"></div>
    <button onclick="saveP()" class="btn-p" style="width:100%;margin-top:20px">Salva Profilo</button>
    <button onclick="doLogout()" style="width:100%;margin-top:10px;color:var(--red);background:none;border:none;cursor:pointer">Esci</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="goTab('dash',this)">Dashboard</div>
  <div class="tab" onclick="goTab('journal',this)">Journal</div>
  <div class="tab" onclick="goTab('stats',this)">Statistiche</div>
  <div class="tab" onclick="goTab('support',this)">Supporto</div>
</div>

<div id="main" class="content"></div>

<button id="aiFloatBtn" onclick="toggleChat()">🤖</button>
<div id="aiFloatPanel">
  <div style="background:linear-gradient(135deg,rgba(0,229,204,0.2),rgba(155,93,229,0.2));padding:15px;color:#fff;display:flex;justify-content:space-between;align-items:center;">
    <div style="display:flex;flex-direction:column"><span style="font-size:12px;font-weight:700">Supporto Live</span><span id="chat_status" style="font-size:9px;color:var(--green)">● Online</span></div>
    <span onclick="toggleChat()" style="cursor:pointer">✕</span>
  </div>
  <div id="chat_msgs" style="height:320px;overflow-y:auto;padding:15px;background:#060810;display:flex;flex-direction:column;gap:12px"></div>
  <div style="padding:12px;display:flex;gap:8px;background:#0a0c18">
    <textarea id="chat_in" rows="1" style="flex:1;background:#13162a;border:1px solid var(--border);color:#fff;padding:10px;border-radius:10px;resize:none;" placeholder="Scrivi..."></textarea>
    <button onclick="sendMsg()" style="background:var(--teal2);border:none;border-radius:10px;padding:0 15px;cursor:pointer;color:#fff;">↗</button>
  </div>
</div>

<script>
const _sb = supabase.createClient('https://kvvrvhkomdpdikohvcsv.supabase.co','sb_publishable_289bMctZ8BjEG_gZn5dJ5A_7aJZRjpx');
let accountData = {fn:'', ln:'', photo:null, email:''};
let _ticketId = null;
let _lastMsgAt = new Date().toISOString();
let _aiOpen = false;

// AUTH
function doLogin(){
  _sb.auth.signInWithPassword({email:document.getElementById('l_email').value, password:document.getElementById('l_pass').value})
  .then(res => { if(res.error) alert(res.error.message); else { document.getElementById('loginPage').style.display='none'; accountData.email = res.data.user.email; loadP(); render(); } });
}
function doRegister(){
  _sb.auth.signUp({email:document.getElementById('r_email').value, password:document.getElementById('r_pass').value, options:{data:{first_name:document.getElementById('r_name').value}}})
  .then(res => { if(res.error) alert(res.error.message); else alert("Richiesta Inviata!"); });
}
function doLogout(){ _sb.auth.signOut().then(()=>location.reload()); }

// PROFILO
function toggleAcc(e){ e.stopPropagation(); const p=document.getElementById('accPanel'); p.style.display = p.style.display==='none'?'block':'none'; }
function saveP(){
  accountData.fn = document.getElementById('p_fn').value; accountData.ln = document.getElementById('p_ln').value;
  localStorage.setItem('ph_user_v5', JSON.stringify(accountData));
  document.getElementById('nav_name').textContent = accountData.fn || 'Account';
  alert("Profilo Salvato!");
}
function uploadP(i){
  if(i.files && i.files[0]){
    const r = new FileReader();
    r.onload = e => {
      accountData.photo = e.target.result;
      document.getElementById('p_photo').innerHTML = `<img src="${e.target.result}">`;
      document.getElementById('nav_photo').innerHTML = `<img src="${e.target.result}">`;
      localStorage.setItem('ph_user_v5', JSON.stringify(accountData));
    };
    r.readAsDataURL(i.files[0]);
  }
}
function loadP(){
  const s = localStorage.getItem('ph_user_v5');
  if(s){
    accountData = JSON.parse(s);
    document.getElementById('p_fn').value = accountData.fn || ''; document.getElementById('p_ln').value = accountData.ln || '';
    document.getElementById('nav_name').textContent = accountData.fn || 'Account';
    if(accountData.photo){
      document.getElementById('p_photo').innerHTML = `<img src="${accountData.photo}">`;
      document.getElementById('nav_photo').innerHTML = `<img src="${accountData.photo}">`;
    }
  }
}

// LINGUE (FUNZIONANTE)
function changeL(c) {
  const s = document.querySelector('.goog-te-combo');
  if(s) { s.value = c; s.dispatchEvent(new Event('change')); }
  else { alert("Il traduttore si sta attivando..."); }
}

// CHAT & TELEGRAM (FUNZIONANTE)
const staff = [{n:'Marco', img:'11'}, {n:'Laura', img:'5'}, {n:'Alessio', img:'12'}, {n:'Giulia', img:'9'}];

function toggleChat(){ 
  _aiOpen = !_aiOpen;
  document.getElementById('aiFloatPanel').classList.toggle('open'); 
  if(_aiOpen && !document.getElementById('chat_msgs').innerHTML) {
    addMsg('bot', 'Ciao! Sono l\'assistente PropHedge. Scrivi "supporto umano" per parlare con noi.');
  }
}

function addMsg(role, txt){
  const m = document.getElementById('chat_msgs');
  const row = document.createElement('div'); row.className = 'ai-msg-row' + (role==='usr'?' user':'');
  const s = staff[Math.floor(Math.random()*staff.length)];
  let ava = role==='bot' ? '🤖' : (role==='support' ? `<img src="https://i.pravatar.cc/150?img=${s.img}">` : '👤');
  row.innerHTML = `<div class="ai-msg-ava">${ava}</div><div class="ai-bubble ${role==='usr'?'usr':'bot'}">${txt}</div>`;
  m.appendChild(row); m.scrollTop = m.scrollHeight;
}

async function sendMsg(){
  const i = document.getElementById('chat_in'); const txt = i.value.trim(); if(!txt) return;
  addMsg('usr', txt); i.value = '';
  if(!_ticketId) _ticketId = 'TKT-' + Date.now();

  fetch('/api/support-send', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ ticket_id: _ticketId, message: txt, user: accountData.email || 'Ospite' })
  });

  if(txt.toLowerCase().includes('supporto umano')) {
    document.getElementById('chat_status').innerHTML = '● Operatori: ' + staff.slice(0,3).map(x=>x.n).join(', ');
    addMsg('bot', 'Ti sto collegando... 🎧 Scrivi la tua **EMAIL** per ricevere risposta.');
    startPolling();
  }
}

function startPolling(){
  setInterval(async () => {
    if(!_ticketId || !_aiOpen) return;
    try {
      const r = await fetch(`/api/support-get?ticket_id=${_ticketId}&last_msg=${_lastMsgAt}`);
      const d = await r.json();
      if(d.messages && d.messages.length > 0) {
        d.messages.forEach(msg => { addMsg('support', msg.text); _lastMsgAt = msg.created_at; });
      }
    } catch(e) {}
  }, 4000);
}

function goTab(t, el){
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('main').innerHTML = `<div class="panel"><h3>${t.toUpperCase()}</h3><p>Contenuto in caricamento...</p></div>`;
}

function render(){ goTab('dash', document.querySelector('.tab')); }

window.onload = () => { loadP(); render(); };
document.addEventListener('click', (e) => { if(!e.target.closest('#accPanel') && !e.target.closest('#tabAccount')) document.getElementById('accPanel').style.display='none'; });
</script>
</body>
</html>
