<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropHedge - VISIONTRADING</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Barlow:wght@400;700&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({pageLanguage: 'it', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
}
</script>
<style>
:root {
  --bg:#060810; --bg2:#0c0f1a; --border:#1e2840; --t:#eef0f8; --t3:#3d4d78;
  --teal:#00e5cc; --teal2:#00b8a4; --violet:#9b5de5; --red:#ff4060; --green:#00d68f;
}
body { background:var(--bg); color:var(--t); font-family:'Barlow', sans-serif; margin:0; padding-bottom:100px; }
.hdr { height:60px; background:rgba(6,8,16,0.95); display:flex; align-items:center; padding:0 20px; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.logo { font-family:'Chakra Petch'; font-size:20px; font-weight:700; }
.tabs { display:flex; background:var(--bg2); border-bottom:1px solid var(--border); padding:5px 10px; }
.tab { padding:10px 15px; cursor:pointer; font-size:12px; font-weight:700; color:var(--t3); text-transform:uppercase; }
.tab.active { color:var(--teal); border-bottom:2px solid var(--teal); }
.content { padding:20px; max-width:1200px; margin:0 auto; }
.panel { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:20px; }
.btn-p { background:linear-gradient(135deg, var(--teal2), var(--violet)); border:none; color:#fff; padding:12px 20px; border-radius:8px; cursor:pointer; font-weight:700; }
.btn-g { background:none; border:1px solid var(--border); color:var(--t); padding:10px 15px; border-radius:8px; cursor:pointer; }
input { width:100%; padding:10px; margin-top:5px; background:#111628; border:1px solid var(--border); color:#fff; border-radius:6px; box-sizing:border-box; }
#aiFloatBtn { position:fixed; bottom:30px; right:30px; width:60px; height:60px; border-radius:50%; background:var(--teal); border:none; font-size:30px; cursor:pointer; z-index:1000; box-shadow:0 5px 15px rgba(0,0,0,0.3); }
#aiFloatPanel { position:fixed; bottom:100px; right:30px; width:350px; background:#0a0c18; border:1px solid var(--teal); border-radius:15px; display:none; flex-direction:column; z-index:1000; overflow:hidden; }
.ai-msg-row { display:flex; gap:10px; padding:10px; align-items:flex-start; }
.ai-msg-row.user { flex-direction:row-reverse; }
.ai-bubble { padding:10px; border-radius:10px; font-size:13px; max-width:80%; line-height:1.4; }
.ai-bubble.bot { background:var(--bg2); color:#c8d0e8; }
.ai-bubble.usr { background:var(--teal2); color:#fff; }
.ai-msg-ava { width:30px; height:30px; border-radius:50%; overflow:hidden; background:var(--bg); flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.skiptranslate iframe { display:none !important; }
body { top:0px !important; }
</style>
</head>
<body>

<div id="loginPage" style="position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;">
  <div class="panel" style="width:350px;text-align:center">
    <h2>PropHedge Pro</h2>
    <input id="l_email" type="email" placeholder="Email">
    <input id="l_pass" type="password" placeholder="Password" style="margin-top:10px">
    <button onclick="doLogin()" class="btn-p" style="width:100%;margin-top:20px">ACCEDI</button>
    <button onclick="document.getElementById('loginPage').style.display='none';document.getElementById('purchasePage').style.display='flex'" class="btn-g" style="width:100%;margin-top:10px">REGISTRATI GRATIS</button>
  </div>
</div>

<div id="purchasePage" style="position:fixed;inset:0;background:var(--bg);z-index:1001;display:none;align-items:center;justify-content:center;">
  <div class="panel" style="width:350px">
    <h3>Richiedi Accesso</h3>
    <input id="r_name" type="text" placeholder="Nome e Cognome">
    <input id="r_email" type="email" placeholder="Email" style="margin-top:10px">
    <input id="r_pass" type="password" placeholder="Password" style="margin-top:10px">
    <button onclick="doRegister()" class="btn-p" style="width:100%;margin-top:20px">INVIA RICHIESTA</button>
    <button onclick="location.reload()" class="btn-g" style="width:100%;margin-top:10px">ANNULLA</button>
  </div>
</div>

<div class="hdr">
  <div class="logo"><span style="color:var(--teal)">Prop</span><span style="color:var(--violet)">Hedge</span></div>
  <div id="google_translate_element" style="margin-left:auto;margin-right:20px"></div>
  <div onclick="toggleAcc(event)" style="cursor:pointer; display:flex; align-items:center; gap:8px">
    <div id="nav_photo" style="width:30px;height:30px;border-radius:50%;background:#3d4d78;overflow:hidden">👤</div>
    <span id="nav_name">Account</span>
  </div>
</div>

<div id="accPanel" style="display:none;position:fixed;top:70px;right:20px;width:280px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,0.5)">
  <div style="text-align:center">
    <div onclick="document.getElementById('f_up').click()" style="width:60px;height:60px;border-radius:50%;background:#1e2840;margin:0 auto 10px;overflow:hidden;border:2px solid var(--teal);cursor:pointer">
      <div id="p_photo">👤</div>
    </div>
    <input type="file" id="f_up" style="display:none" onchange="uploadP(this)">
    <input id="p_fn" placeholder="Nome" style="margin-bottom:5px">
    <input id="p_ln" placeholder="Cognome">
    <button onclick="saveP()" class="btn-p" style="width:100%;margin-top:15px">SALVA DATI</button>
    <button onclick="location.reload()" class="btn-g" style="width:100%;margin-top:5px;color:var(--red)">ESCI</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="goTab('dash',this)">Dashboard</div>
  <div class="tab" onclick="goTab('journal',this)">Journal</div>
  <div class="tab" onclick="goTab('stats',this)">Statistiche</div>
</div>

<div id="main" class="content">
  <div class="panel">
    <h3>Dashboard Challenge</h3>
    <p>Benvenuto in PropHedge. Configura la tua sfida per iniziare il calcolo dei lotti.</p>
    <button class="btn-p">+ NUOVA SFIDA</button>
  </div>
</div>

<button id="aiFloatBtn" onclick="toggleChat()">🤖</button>
<div id="aiFloatPanel">
  <div style="background:var(--teal2);padding:15px;color:#fff;display:flex;justify-content:space-between;align-items:center">
    <span id="chat_status">● Online</span>
    <span onclick="toggleChat()" style="cursor:pointer">✕</span>
  </div>
  <div id="chat_msgs" style="height:300px;overflow-y:auto;padding:10px;background:var(--bg);display:flex;flex-direction:column;gap:10px"></div>
  <div style="padding:10px;border-top:1px solid var(--border);display:flex;gap:5px">
    <textarea id="chat_in" rows="1" style="flex:1;background:var(--bg2);border:1px solid var(--border);color:#fff;padding:8px;border-radius:5px;resize:none" placeholder="Scrivi..."></textarea>
    <button onclick="sendMsg()" style="background:var(--teal);border:none;border-radius:5px;padding:0 15px;cursor:pointer">↗</button>
  </div>
</div>

<script>
const _sb = supabase.createClient('https://kvvrvhkomdpdikohvcsv.supabase.co','sb_publishable_289bMctZ8BjEG_gZn5dJ5A_7aJZRjpx');
let accountData = {fn:'', ln:'', photo:null};

function doLogin(){
  _sb.auth.signInWithPassword({email:document.getElementById('l_email').value, password:document.getElementById('l_pass').value})
  .then(res => { if(res.error) alert(res.error.message); else { document.getElementById('loginPage').style.display='none'; loadP(); } });
}

function doRegister(){
  _sb.auth.signUp({email:document.getElementById('r_email').value, password:document.getElementById('r_pass').value, options:{data:{first_name:document.getElementById('r_name').value}}})
  .then(res => { if(res.error) alert(res.error.message); else alert("Richiesta Inviata! L'admin ti abiliterà a breve."); });
}

function goTab(t, el){
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  const m = document.getElementById('main');
  if(t==='dash') m.innerHTML = '<div class="panel"><h3>Dashboard</h3><p>Nessuna sfida attiva.</p></div>';
  if(t==='journal') m.innerHTML = '<div class="panel"><h3>Journal</h3><p>Collega MT4/MT5 per vedere i trade.</p></div>';
  if(t==='stats') m.innerHTML = '<div class="panel"><h3>Statistiche</h3><p>Dati non disponibili.</p></div>';
}

function toggleAcc(e){ e.stopPropagation(); const p=document.getElementById('accPanel'); p.style.display = p.style.display==='none'?'block':'none'; }
function saveP(){
  accountData.fn = document.getElementById('p_fn').value; accountData.ln = document.getElementById('p_ln').value;
  localStorage.setItem('ph_user', JSON.stringify(accountData));
  document.getElementById('nav_name').textContent = accountData.fn || 'Account';
  alert("Profilo aggiornato!");
}
function uploadP(i){
  if(i.files && i.files[0]){
    const r = new FileReader();
    r.onload = e => {
      accountData.photo = e.target.result;
      document.getElementById('p_photo').innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover">`;
      document.getElementById('nav_photo').innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover">`;
      localStorage.setItem('ph_user', JSON.stringify(accountData));
    };
    r.readAsDataURL(i.files[0]);
  }
}
function loadP(){
  const s = localStorage.getItem('ph_user');
  if(s){
    accountData = JSON.parse(s);
    document.getElementById('p_fn').value = accountData.fn; document.getElementById('p_ln').value = accountData.ln;
    document.getElementById('nav_name').textContent = accountData.fn || 'Account';
    if(accountData.photo){
      document.getElementById('p_photo').innerHTML = `<img src="${accountData.photo}" style="width:100%;height:100%;object-fit:cover">`;
      document.getElementById('nav_photo').innerHTML = `<img src="${accountData.photo}" style="width:100%;height:100%;object-fit:cover">`;
    }
  }
}

// CHAT LOGIC
const staff = [
  {n:'Marco', img:'11'}, {n:'Laura', img:'5'}, {n:'Alessio', img:'12'}, {n:'Giulia', img:'9'},
  {n:'Roberto', img:'13'}, {n:'Elena', img:'10'}, {n:'Fabio', img:'14'}, {n:'Chiara', img:'16'}, {n:'Davide', img:'18'}
];
let human = false;

function toggleChat(){ const p=document.getElementById('aiFloatPanel'); p.style.display=p.style.display==='none'?'flex':'none'; if(p.style.display==='flex' && !document.getElementById('chat_msgs').innerHTML) addMsg('bot', 'Ciao! Come posso aiutarti? Se cerchi supporto umano scrivi "supporto umano".'); }
function addMsg(role, txt){
  const m = document.getElementById('chat_msgs');
  const row = document.createElement('div'); row.className = 'ai-msg-row' + (role==='usr'?' user':'');
  const s = staff[Math.floor(Math.random()*staff.length)];
  const ava = role==='bot' ? '🤖' : (role==='support' ? `<img src="https://i.pravatar.cc/150?img=${s.img}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : '👤');
  row.innerHTML = `<div class="ai-msg-ava">${ava}</div><div class="ai-bubble ${role==='usr'?'usr':'bot'}">${txt}</div>`;
  m.appendChild(row); m.scrollTop = m.scrollHeight;
}
function sendMsg(){
  const i = document.getElementById('chat_in'); const txt = i.value.trim(); if(!txt) return;
  addMsg('usr', txt); i.value = '';
  if(txt.toLowerCase().includes('supporto umano') && !human){
    human = true;
    const online = staff.sort(()=>.5-Math.random()).slice(0,3).map(x=>x.n).join(', ');
    document.getElementById('chat_status').innerHTML = '● Online: ' + online;
    addMsg('bot', 'Ti sto mettendo in contatto con un operatore. 🎧\nPer favore scrivici la tua **EMAIL e NOME** per procedere.');
  } else if(human) {
    addMsg('support', 'Messaggio ricevuto! Un operatore ti risponderà qui a breve.');
  } else { setTimeout(()=> addMsg('bot', 'Sto analizzando la tua richiesta...'), 1000); }
}

window.onload = loadP;
document.addEventListener('click', () => { document.getElementById('accPanel').style.display='none'; });
</script>
</body>
</html>
